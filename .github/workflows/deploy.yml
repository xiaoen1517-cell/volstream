name: Deploy VolStream

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: vars
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository }}:${TIMESTAMP}-${SHORT_SHA}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    environment: aliyunvolstream
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR || '/opt/volstream' }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          # 同步 .env 到服务器
          echo "${{ secrets.ENV_FILE }}" > .env.production
          scp -P $SSH_PORT .env.production $SSH_USER@$SSH_HOST:$PROJECT_DIR/.env
          rm -f .env.production

          # 同步生产 compose 文件并替换镜像标签
          sed "s|[$]{IMAGE_TAG}|$IMAGE_TAG|g" docker-compose.prod.yml > docker-compose.prod.replaced.yml
          scp -P $SSH_PORT docker-compose.prod.replaced.yml $SSH_USER@$SSH_HOST:$PROJECT_DIR/docker-compose.yml
          rm -f docker-compose.prod.replaced.yml

          # 在服务器上登录 ghcr 并拉取镜像启动
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST << EOF
            set -e
            cd $PROJECT_DIR
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull $IMAGE_TAG
            docker compose up -d
            docker compose exec -T timescaledb pg_isready -U \${DB_USER} -d \${DB_NAME} || sleep 5
            docker compose exec -T app python main.py init-db
            docker image prune -f
          EOF
