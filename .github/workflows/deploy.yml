name: Deploy VolStream

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/test_indicators.py tests/test_volume_profile.py tests/test_whale_detector.py tests/test_iceberg_detector.py -v

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR || '/opt/volstream' }}
        run: |
          # 同步 .env 到服务器（从 GitHub Secret 写入，避免提交到仓库）
          echo "${{ secrets.ENV_FILE }}" > .env.production
          scp -P $SSH_PORT .env.production $SSH_USER@$SSH_HOST:$PROJECT_DIR/.env
          rm -f .env.production

          # 在服务器上拉取最新代码并重启服务
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST << EOF
            set -e
            cd $PROJECT_DIR
            git pull origin main
            docker-compose --env-file .env up -d --build
            docker-compose exec -T timescaledb pg_isready -U \${DB_USER} -d \${DB_NAME} || sleep 5
            docker-compose exec -T app python main.py init-db
            docker image prune -f
          EOF
