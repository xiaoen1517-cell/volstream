name: Build and Deploy VolStream

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/test_indicators.py tests/test_volume_profile.py tests/test_whale_detector.py tests/test_iceberg_detector.py -v

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: vars
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository }}:${TIMESTAMP}-${SHORT_SHA}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull image locally and save to tar
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker pull $IMAGE_TAG
          docker save $IMAGE_TAG | gzip > volstream-image.tar.gz
          ls -lh volstream-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: volstream-image
          path: volstream-image.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    environment: aliyunvolstream
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: volstream-image

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR || '/opt/volstream' }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          # 同步 .env 到服务器
          echo "${{ secrets.ENV_FILE }}" > .env.production
          scp -P $SSH_PORT .env.production $SSH_USER@$SSH_HOST:$PROJECT_DIR/.env
          rm -f .env.production

          # 同步生产 compose 文件并替换镜像标签
          sed "s|\\${IMAGE_TAG}|$IMAGE_TAG|g" docker-compose.prod.yml > docker-compose.prod.replaced.yml
          scp -P $SSH_PORT docker-compose.prod.replaced.yml $SSH_USER@$SSH_HOST:$PROJECT_DIR/docker-compose.yml
          rm -f docker-compose.prod.replaced.yml

          # 同步镜像压缩包到服务器并加载
          scp -P $SSH_PORT volstream-image.tar.gz $SSH_USER@$SSH_HOST:$PROJECT_DIR/volstream-image.tar.gz

          # 在服务器上加载镜像并启动
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST << EOF
            set -e
            cd $PROJECT_DIR
            gunzip -c volstream-image.tar.gz | docker load
            docker tag $IMAGE_TAG volstream:latest || true
            docker compose up -d
            docker compose exec -T timescaledb pg_isready -U \${DB_USER} -d \${DB_NAME} || sleep 5
            docker compose exec -T app python main.py init-db
            rm -f volstream-image.tar.gz
            docker image prune -f
          EOF
