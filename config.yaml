app:
  name: volstream
  log_level: INFO
  history_days: 30

exchange:
  name: binance  # binance | okx
  sandbox: false
  enableRateLimit: true

websocket:
  open_timeout: 30
  ping_timeout: 20
  close_timeout: 10
  proxy: ""  # e.g. socks5://127.0.0.1:1080 or http://127.0.0.1:7890

symbols:
  - BTC/USDT
  - ETH/USDT
  - BNB/USDT
  - SOL/USDT

timeframes:
  - 5m
  - 15m
  - 1h
  - 4h

weights:
  5m: 0.15
  15m: 0.25
  1h: 0.35
  4h: 0.25

indicators:
  ema_short: 12
  ema_long: 26
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9

analytics:
  whale_threshold_usd: 50000  # 单笔成交超过此金额视为大单
  volume_profile_bins: 24      # 每个周期价格分桶数
  value_area_ratio: 0.70       # Value Area 包含 70% 成交量
  iceberg_lookback_trades: 20  # 冰山检测回溯成交数
  iceberg_score_threshold: 0.6 # 冰山信号输出阈值

signal:
  strength_threshold:
    strong: 70
    moderate: 40
